<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00d9ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00d9ff" stop-opacity="0.4"/>
      <stop offset="70%"  stop-color="#00d9ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      .name {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 54px;
        font-weight: 800;
        letter-spacing: -1.5px;
        fill: #ffffff;
        filter: url(#textglow);
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.4s forwards;
      }
      .accent {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 54px;
        font-weight: 800;
        letter-spacing: -1.5px;
        fill: #00d9ff;
        filter: url(#glow);
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
      }
      .role {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
        fill: #7d8590;
        letter-spacing: 4px;
        text-transform: uppercase;
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.8s forwards;
      }
      .badge-bg {
        fill: #00d9ff;
        fill-opacity: 0.08;
        stroke: #00d9ff;
        stroke-opacity: 0.5;
        stroke-width: 0.8;
        rx: 4;
        opacity: 0;
      }
      .badge-text {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 11.5px;
        fill: #00d9ff;
        opacity: 0;
      }
      .b1 { animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.3s forwards; }
      .b2 { animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.55s forwards; }
      .b3 { animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.8s forwards; }
      .b4 { animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 2.05s forwards; }
      .divider {
        opacity: 0;
        animation: expandW 0.7s cubic-bezier(0.22,1,0.36,1) 1.1s forwards;
        transform-origin: 50% 50%;
      }
      .scanline {
        opacity: 0;
        animation: scan 0.7s ease-out 0.1s forwards;
      }
      .sub {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 12px;
        fill: #484f58;
        opacity: 0;
        animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 2.3s forwards;
      }
      .corner { opacity: 0; animation: pop 0.3s ease forwards; }
      .c1 { animation-delay: 0.05s; }
      .c2 { animation-delay: 0.12s; }
      .c3 { animation-delay: 0.19s; }
      .c4 { animation-delay: 0.26s; }
      .dot {
        fill: #00d9ff;
        opacity: 0;
        animation: pulse 4s ease-in-out infinite;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pop {
        from { opacity: 0; transform: scale(0.88); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes expandW {
        from { opacity: 0; transform: scaleX(0); }
        to   { opacity: 1; transform: scaleX(1); }
      }
      @keyframes scan {
        0%   { opacity: 0.6; transform: translateY(0px); }
        100% { opacity: 0;   transform: translateY(280px); }
      }
      @keyframes pulse {
        0%,100% { opacity: 0.1; }
        50%      { opacity: 0.5; }
      }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="70"  x2="900" y2="70"  stroke="#00d9ff" stroke-width="0.25" stroke-opacity="0.05"/>
  <line x1="0" y1="140" x2="900" y2="140" stroke="#00d9ff" stroke-width="0.25" stroke-opacity="0.05"/>
  <line x1="0" y1="210" x2="900" y2="210" stroke="#00d9ff" stroke-width="0.25" stroke-opacity="0.05"/>
  <line x1="225" y1="0" x2="225" y2="280" stroke="#00d9ff" stroke-width="0.25" stroke-opacity="0.05"/>
  <line x1="450" y1="0" x2="450" y2="280" stroke="#00d9ff" stroke-width="0.25" stroke-opacity="0.05"/>
  <line x1="675" y1="0" x2="675" y2="280" stroke="#00d9ff" stroke-width="0.25" stroke-opacity="0.05"/>

  <!-- Corner brackets -->
  <path d="M18,18 L18,40 M18,18 L40,18" stroke="#00d9ff" stroke-width="1.5" fill="none" stroke-linecap="round" class="corner c1"/>
  <path d="M882,18 L882,40 M882,18 L860,18" stroke="#00d9ff" stroke-width="1.5" fill="none" stroke-linecap="round" class="corner c2"/>
  <path d="M18,262 L18,240 M18,262 L40,262" stroke="#00d9ff" stroke-width="1.5" fill="none" stroke-linecap="round" class="corner c3"/>
  <path d="M882,262 L882,240 M882,262 L860,262" stroke="#00d9ff" stroke-width="1.5" fill="none" stroke-linecap="round" class="corner c4"/>

  <!-- Scanline -->
  <rect x="0" y="-2" width="900" height="3" fill="url(#scanGrad)" class="scanline"/>

  <!-- Ambient dots -->
  <circle cx="58"  cy="48"  r="1.8" class="dot" style="animation-delay:0s"/>
  <circle cx="842" cy="72"  r="1.8" class="dot" style="animation-delay:0.6s"/>
  <circle cx="65"  cy="230" r="1.8" class="dot" style="animation-delay:1.2s"/>
  <circle cx="835" cy="208" r="1.8" class="dot" style="animation-delay:0.3s"/>
  <circle cx="450" cy="28"  r="1.8" class="dot" style="animation-delay:0.9s"/>
  <circle cx="180" cy="255" r="1.8" class="dot" style="animation-delay:1.5s"/>
  <circle cx="720" cy="255" r="1.8" class="dot" style="animation-delay:0.7s"/>

  <!-- Name: "Pedro " normal + "Afonso" accented -->
  <text x="450" y="112" text-anchor="middle" class="name">Pedro Afonso</text>

  <!-- Role subtitle -->
  <text x="450" y="140" text-anchor="middle" class="role">ML Researcher · RL · Causal AI · Autonomous Agents</text>

  <!-- Divider line -->
  <rect x="150" y="155" width="600" height="0.8" fill="url(#accentLine)" class="divider"/>

  <!-- Badge 1: 1st Place -->
  <rect x="86"  y="168" width="152" height="23" rx="4" class="badge-bg b1"/>
  <text x="162" y="183.5" text-anchor="middle" class="badge-text b1">🥇  1st · CrewAI 2025</text>

  <!-- Badge 2: AWS -->
  <rect x="250" y="168" width="138" height="23" rx="4" class="badge-bg b2"/>
  <text x="319" y="183.5" text-anchor="middle" class="badge-text b2">☁️  AWS ML Certified</text>

  <!-- Badge 3: NVIDIA -->
  <rect x="400" y="168" width="128" height="23" rx="4" class="badge-bg b3"/>
  <text x="464" y="183.5" text-anchor="middle" class="badge-text b3">⚡  NVIDIA Inception</text>

  <!-- Badge 4: Google -->
  <rect x="540" y="168" width="152" height="23" rx="4" class="badge-bg b4"/>
  <text x="616" y="183.5" text-anchor="middle" class="badge-text b4">🌱  Google for Startups</text>

  <!-- Bottom sub text -->
  <text x="450" y="230" text-anchor="middle" class="sub">Building  Veredictos  ·  PaymentsLine  ·  MIOSA  —  Campo Grande, Brazil</text>
</svg>
