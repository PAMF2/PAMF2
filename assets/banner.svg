<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="45%" cy="35%" r="75%">
      <stop offset="0%"   stop-color="#111827"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="45%" r="40%">
      <stop offset="0%"   stop-color="#1e3a5f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="divLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="75%"  stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#60a5fa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <filter id="nameglow" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"  result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineglow" x="-5%" y="-200%" width="110%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      .name {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 60px;
        font-weight: 900;
        letter-spacing: -2.5px;
        fill: #f0f6fc;
        filter: url(#nameglow);
        opacity: 0;
        animation: riseIn 1.1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
      }
      .role {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 5px;
        fill: #4d6278;
        text-transform: uppercase;
        opacity: 0;
        animation: riseIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
      }
      .divider {
        opacity: 0;
        transform-origin: center;
        animation: expandLine 0.9s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
        filter: url(#lineglow);
      }
      .b-bg   { fill: #162032; rx: 3; opacity: 0; }
      .b-text {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.2px;
        fill: #7aaccc;
        opacity: 0;
      }
      .b1 { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 1.45s forwards; }
      .b2 { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 1.67s forwards; }
      .b3 { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 1.89s forwards; }
      .b4 { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 2.11s forwards; }
      .scan {
        opacity: 0;
        animation: scan 0.9s ease-out 0.04s forwards;
      }
      .corner {
        stroke: #3b82f6;
        stroke-width: 1.5;
        stroke-opacity: 0.65;
        stroke-linecap: round;
        fill: none;
        opacity: 0;
        animation: popIn 0.25s ease forwards;
      }
      .c1{animation-delay:0.02s} .c2{animation-delay:0.07s}
      .c3{animation-delay:0.12s} .c4{animation-delay:0.17s}
      .grid { stroke: #1a2535; stroke-width: 0.5; }
      .sub {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 9.5px;
        letter-spacing: 3.5px;
        fill: #253444;
        text-transform: uppercase;
        opacity: 0;
        animation: riseIn 0.8s ease 2.4s forwards;
      }

      /* Particles */
      .p { fill: #3b82f6; animation: floatDot ease-in-out infinite; }
      .p1  { r:1.5; cx:72;  cy:52;  animation-duration:6s;  animation-delay:0s;   fill-opacity:0.3; }
      .p2  { r:1.0; cx:830; cy:44;  animation-duration:7s;  animation-delay:0.8s; fill-opacity:0.2; }
      .p3  { r:1.8; cx:145; cy:220; animation-duration:5s;  animation-delay:0.3s; fill-opacity:0.25; }
      .p4  { r:1.2; cx:760; cy:235; animation-duration:8s;  animation-delay:1.1s; fill-opacity:0.2; }
      .p5  { r:1.0; cx:450; cy:24;  animation-duration:6.5s;animation-delay:0.5s; fill-opacity:0.2; }
      .p6  { r:1.5; cx:300; cy:258; animation-duration:7.5s;animation-delay:1.5s; fill-opacity:0.15; }
      .p7  { r:1.0; cx:600; cy:262; animation-duration:5.5s;animation-delay:0.9s; fill-opacity:0.15; }
      .p8  { r:0.8; cx:200; cy:38;  animation-duration:9s;  animation-delay:2.0s; fill-opacity:0.18; }
      .p9  { r:0.8; cx:700; cy:42;  animation-duration:8.5s;animation-delay:0.2s; fill-opacity:0.18; }
      .p10 { r:1.2; cx:860; cy:190; animation-duration:6s;  animation-delay:1.3s; fill-opacity:0.22; }
      .p11 { r:1.0; cx:50;  cy:160; animation-duration:7s;  animation-delay:0.7s; fill-opacity:0.2; }
      .p12 { r:0.7; cx:520; cy:268; animation-duration:10s; animation-delay:3.0s; fill-opacity:0.12; }

      @keyframes riseIn {
        from { opacity:0; transform:translateY(12px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes popIn {
        from { opacity:0; transform:scale(0.85); }
        to   { opacity:1; transform:scale(1); }
      }
      @keyframes expandLine {
        from { opacity:0; transform:scaleX(0); }
        to   { opacity:1; transform:scaleX(1); }
      }
      @keyframes scan {
        0%   { opacity:0.9; transform:translateY(0); }
        100% { opacity:0;   transform:translateY(284px); }
      }
      @keyframes floatDot {
        0%,100% { transform:translateY(0px);   fill-opacity:0.15; }
        50%      { transform:translateY(-8px);  fill-opacity:0.5; }
      }
    ]]></style>
  </defs>

  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#glow-center)"/>

  <!-- Grid -->
  <line x1="0" y1="70"  x2="900" y2="70"  class="grid"/>
  <line x1="0" y1="140" x2="900" y2="140" class="grid"/>
  <line x1="0" y1="210" x2="900" y2="210" class="grid"/>
  <line x1="225" y1="0" x2="225" y2="280" class="grid"/>
  <line x1="450" y1="0" x2="450" y2="280" class="grid"/>
  <line x1="675" y1="0" x2="675" y2="280" class="grid"/>

  <!-- Corners -->
  <path d="M20,20 L20,44 M20,20 L44,20" class="corner c1"/>
  <path d="M880,20 L880,44 M880,20 L856,20" class="corner c2"/>
  <path d="M20,260 L20,236 M20,260 L44,260" class="corner c3"/>
  <path d="M880,260 L880,236 M880,260 L856,260" class="corner c4"/>

  <!-- Scan -->
  <rect x="0" y="0" width="900" height="3" fill="url(#scanGrad)" class="scan"/>

  <!-- Particles -->
  <circle class="p p1"/><circle class="p p2"/><circle class="p p3"/>
  <circle class="p p4"/><circle class="p p5"/><circle class="p p6"/>
  <circle class="p p7"/><circle class="p p8"/><circle class="p p9"/>
  <circle class="p p10"/><circle class="p p11"/><circle class="p p12"/>

  <!-- Name -->
  <text x="450" y="112" text-anchor="middle" class="name">Pedro Afonso</text>

  <!-- Role -->
  <text x="450" y="140" text-anchor="middle" class="role">ML Researcher · RL · Causal AI · Autonomous Agents</text>

  <!-- Divider -->
  <rect x="130" y="157" width="640" height="1" fill="url(#divLine)" class="divider"/>

  <!-- Badges -->
  <rect x="85"  y="170" width="150" height="21" rx="3" class="b-bg b1"/>
  <text x="160" y="185" text-anchor="middle" class="b-text b1">1st Place · CrewAI 2025</text>

  <rect x="247" y="170" width="130" height="21" rx="3" class="b-bg b2"/>
  <text x="312" y="185" text-anchor="middle" class="b-text b2">AWS ML Certified</text>

  <rect x="389" y="170" width="124" height="21" rx="3" class="b-bg b3"/>
  <text x="451" y="185" text-anchor="middle" class="b-text b3">NVIDIA Inception</text>

  <rect x="525" y="170" width="152" height="21" rx="3" class="b-bg b4"/>
  <text x="601" y="185" text-anchor="middle" class="b-text b4">Google for Startups</text>

  <!-- Sub -->
  <text x="450" y="238" text-anchor="middle" class="sub">Veredictos · PaymentsLine · MIOSA</text>
</svg>
