<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060910"/>
      <stop offset="60%"  stop-color="#0a1220"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#00d9ff" stop-opacity="0.6"/>
      <stop offset="60%"  stop-color="#00d9ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d9ff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00d9ff" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#00d9ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e6edf3"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6edf3"/>
    </linearGradient>
    <filter id="nameglow" x="-15%" y="-50%" width="130%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="badgeglow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="nameMask">
      <rect width="900" height="300" fill="black"/>
      <rect x="60" y="60" width="780" height="120" fill="white"/>
    </mask>
    <style><![CDATA[
      .name {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 62px;
        font-weight: 900;
        letter-spacing: -2px;
        fill: url(#nameGrad);
        filter: url(#nameglow);
        opacity: 0;
        animation: riseIn 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
      }
      .role {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 12.5px;
        font-weight: 400;
        letter-spacing: 5px;
        fill: #4c9db5;
        text-transform: uppercase;
        opacity: 0;
        animation: riseIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
      }
      .divider {
        opacity: 0;
        transform-origin: center;
        animation: expandLine 0.9s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
      }
      .badge-pill {
        fill: none;
        stroke: #00d9ff;
        stroke-width: 0.7;
        stroke-opacity: 0.45;
        rx: 12;
        opacity: 0;
      }
      .badge-fill {
        fill: #00d9ff;
        fill-opacity: 0.06;
        rx: 12;
        opacity: 0;
      }
      .badge-label {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.5px;
        fill: #58a6c7;
        opacity: 0;
      }
      .b1 { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 1.45s forwards; }
      .b2 { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 1.68s forwards; }
      .b3 { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 1.91s forwards; }
      .b4 { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) 2.14s forwards; }
      .scanline {
        fill: url(#sweep);
        opacity: 0;
        animation: scan 0.8s ease-out 0.05s forwards;
      }
      .corner {
        stroke: #00d9ff;
        stroke-width: 1.2;
        stroke-linecap: round;
        fill: none;
        stroke-opacity: 0.6;
        opacity: 0;
        animation: popIn 0.3s ease forwards;
      }
      .c1 { animation-delay: 0.02s; }
      .c2 { animation-delay: 0.08s; }
      .c3 { animation-delay: 0.14s; }
      .c4 { animation-delay: 0.20s; }
      .gridline {
        stroke: #00d9ff;
        stroke-opacity: 0.04;
        stroke-width: 0.5;
      }
      .dot {
        fill: #00d9ff;
        fill-opacity: 0.3;
        animation: pulse 3.5s ease-in-out infinite;
      }
      .sub {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 11px;
        letter-spacing: 2.5px;
        fill: #30404d;
        text-transform: uppercase;
        opacity: 0;
        animation: riseIn 0.8s ease 2.5s forwards;
      }
      @keyframes riseIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes popIn {
        from { opacity: 0; transform: scale(0.85); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes expandLine {
        from { opacity: 0; transform: scaleX(0); }
        to   { opacity: 1; transform: scaleX(1); }
      }
      @keyframes scan {
        0%   { opacity: 1; transform: translateY(-4px); }
        100% { opacity: 0; transform: translateY(304px); }
      }
      @keyframes pulse {
        0%,100% { fill-opacity: 0.15; r: 1.5; }
        50%      { fill-opacity: 0.55; r: 2.2; }
      }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="0"   y1="75"  x2="900" y2="75"  class="gridline"/>
  <line x1="0"   y1="150" x2="900" y2="150" class="gridline"/>
  <line x1="0"   y1="225" x2="900" y2="225" class="gridline"/>
  <line x1="180" y1="0"   x2="180" y2="300" class="gridline"/>
  <line x1="360" y1="0"   x2="360" y2="300" class="gridline"/>
  <line x1="540" y1="0"   x2="540" y2="300" class="gridline"/>
  <line x1="720" y1="0"   x2="720" y2="300" class="gridline"/>

  <!-- Corners -->
  <path d="M22,22 L22,46 M22,22 L46,22" class="corner c1"/>
  <path d="M878,22 L878,46 M878,22 L854,22" class="corner c2"/>
  <path d="M22,278 L22,254 M22,278 L46,278" class="corner c3"/>
  <path d="M878,278 L878,254 M878,278 L854,278" class="corner c4"/>

  <!-- Scan -->
  <rect x="0" y="0" width="900" height="4" class="scanline"/>

  <!-- Ambient dots -->
  <circle cx="55"  cy="45"  r="1.8" class="dot" style="animation-delay:0s"/>
  <circle cx="845" cy="70"  r="1.8" class="dot" style="animation-delay:0.7s"/>
  <circle cx="60"  cy="255" r="1.8" class="dot" style="animation-delay:1.3s"/>
  <circle cx="840" cy="230" r="1.8" class="dot" style="animation-delay:0.4s"/>
  <circle cx="450" cy="26"  r="1.8" class="dot" style="animation-delay:1.0s"/>
  <circle cx="155" cy="272" r="1.8" class="dot" style="animation-delay:1.7s"/>
  <circle cx="745" cy="272" r="1.8" class="dot" style="animation-delay:0.6s"/>
  <circle cx="290" cy="280" r="1.2" class="dot" style="animation-delay:2.0s"/>
  <circle cx="610" cy="280" r="1.2" class="dot" style="animation-delay:1.1s"/>

  <!-- Name -->
  <text x="450" y="122" text-anchor="middle" class="name">Pedro Afonso</text>

  <!-- Role -->
  <text x="450" y="152" text-anchor="middle" class="role">ML Researcher · RL · Causal AI · Autonomous Agents</text>

  <!-- Divider -->
  <rect x="130" y="168" width="640" height="0.8" fill="url(#divLine)" class="divider"/>

  <!-- Badge 1: 1st Place -->
  <rect x="82"  y="182" width="148" height="22" rx="11" class="badge-fill b1"/>
  <rect x="82"  y="182" width="148" height="22" rx="11" class="badge-pill b1"/>
  <text x="156" y="197" text-anchor="middle" class="badge-label b1">1st Place · CrewAI 2025</text>

  <!-- Badge 2: AWS -->
  <rect x="243" y="182" width="132" height="22" rx="11" class="badge-fill b2"/>
  <rect x="243" y="182" width="132" height="22" rx="11" class="badge-pill b2"/>
  <text x="309" y="197" text-anchor="middle" class="badge-label b2">AWS ML Certified</text>

  <!-- Badge 3: NVIDIA -->
  <rect x="388" y="182" width="130" height="22" rx="11" class="badge-fill b3"/>
  <rect x="388" y="182" width="130" height="22" rx="11" class="badge-pill b3"/>
  <text x="453" y="197" text-anchor="middle" class="badge-label b3">NVIDIA Inception</text>

  <!-- Badge 4: Google -->
  <rect x="531" y="182" width="158" height="22" rx="11" class="badge-fill b4"/>
  <rect x="531" y="182" width="158" height="22" rx="11" class="badge-pill b4"/>
  <text x="610" y="197" text-anchor="middle" class="badge-label b4">Google for Startups</text>

  <!-- Sub -->
  <text x="450" y="253" text-anchor="middle" class="sub">Veredictos · PaymentsLine · MIOSA</text>
</svg>
