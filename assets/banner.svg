<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#111827"/>
      <stop offset="100%" stop-color="#060b12"/>
    </radialGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#3b82f6" stop-opacity="0.9"/>
      <stop offset="65%"  stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      .name {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 58px;
        font-weight: 900;
        letter-spacing: -2px;
        fill: #f0f6fc;
        filter: url(#glow);
        opacity: 0;
        animation: riseIn 1s cubic-bezier(0.16,1,0.3,1) 0.45s forwards;
      }
      .role {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 11.5px;
        font-weight: 500;
        letter-spacing: 4.5px;
        fill: #6e7681;
        text-transform: uppercase;
        opacity: 0;
        animation: riseIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.85s forwards;
      }
      .divider {
        opacity: 0;
        transform-origin: center;
        animation: expandLine 0.8s cubic-bezier(0.16,1,0.3,1) 1.15s forwards;
      }
      .b-bg {
        fill: #1d2d44;
        rx: 3;
        opacity: 0;
      }
      .b-text {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.3px;
        fill: #94b4d4;
        opacity: 0;
      }
      .b1 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.4s forwards; }
      .b2 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.62s forwards; }
      .b3 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.84s forwards; }
      .b4 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 2.06s forwards; }
      .scanline {
        opacity: 0;
        animation: scan 0.75s ease-out 0.05s forwards;
      }
      .corner {
        stroke: #3b82f6;
        stroke-width: 1.5;
        stroke-opacity: 0.7;
        stroke-linecap: round;
        fill: none;
        opacity: 0;
        animation: popIn 0.25s ease forwards;
      }
      .c1 { animation-delay: 0.02s; }
      .c2 { animation-delay: 0.07s; }
      .c3 { animation-delay: 0.12s; }
      .c4 { animation-delay: 0.17s; }
      .grid {
        stroke: #1e2d3d;
        stroke-width: 0.5;
      }
      .dot {
        fill: #3b82f6;
        opacity: 0;
        animation: pulse 4s ease-in-out infinite;
      }
      .sub {
        font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 10px;
        letter-spacing: 3px;
        fill: #30404f;
        text-transform: uppercase;
        opacity: 0;
        animation: riseIn 0.8s ease 2.3s forwards;
      }
      @keyframes riseIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes popIn {
        from { opacity: 0; transform: scale(0.88); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes expandLine {
        from { opacity: 0; transform: scaleX(0); }
        to   { opacity: 1; transform: scaleX(1); }
      }
      @keyframes scan {
        0%   { opacity: 0.8; transform: translateY(0); }
        100% { opacity: 0;   transform: translateY(284px); }
      }
      @keyframes pulse {
        0%,100% { fill-opacity: 0.12; }
        50%      { fill-opacity: 0.45; }
      }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="0" y1="70"  x2="900" y2="70"  class="grid"/>
  <line x1="0" y1="140" x2="900" y2="140" class="grid"/>
  <line x1="0" y1="210" x2="900" y2="210" class="grid"/>
  <line x1="225" y1="0" x2="225" y2="280" class="grid"/>
  <line x1="450" y1="0" x2="450" y2="280" class="grid"/>
  <line x1="675" y1="0" x2="675" y2="280" class="grid"/>

  <!-- Corners -->
  <path d="M20,20 L20,44 M20,20 L44,20" class="corner c1"/>
  <path d="M880,20 L880,44 M880,20 L856,20" class="corner c2"/>
  <path d="M20,260 L20,236 M20,260 L44,260" class="corner c3"/>
  <path d="M880,260 L880,236 M880,260 L856,260" class="corner c4"/>

  <!-- Scan -->
  <rect x="0" y="0" width="900" height="3" fill="url(#scanGrad)" class="scanline"/>

  <!-- Dots -->
  <circle cx="56"  cy="44"  r="1.8" class="dot" style="animation-delay:0.0s"/>
  <circle cx="844" cy="68"  r="1.8" class="dot" style="animation-delay:0.6s"/>
  <circle cx="58"  cy="238" r="1.8" class="dot" style="animation-delay:1.1s"/>
  <circle cx="842" cy="214" r="1.8" class="dot" style="animation-delay:0.4s"/>
  <circle cx="450" cy="24"  r="1.8" class="dot" style="animation-delay:0.9s"/>
  <circle cx="165" cy="264" r="1.4" class="dot" style="animation-delay:1.4s"/>
  <circle cx="735" cy="264" r="1.4" class="dot" style="animation-delay:0.8s"/>

  <!-- Name -->
  <text x="450" y="112" text-anchor="middle" class="name">Pedro Afonso</text>

  <!-- Role -->
  <text x="450" y="140" text-anchor="middle" class="role">ML Researcher · RL · Causal AI · Autonomous Agents</text>

  <!-- Divider -->
  <rect x="140" y="157" width="620" height="1" fill="url(#accentH)" class="divider"/>

  <!-- Badges -->
  <rect x="88"  y="170" width="148" height="21" rx="3" class="b-bg b1"/>
  <text x="162" y="185" text-anchor="middle" class="b-text b1">1st Place  ·  CrewAI 2025</text>

  <rect x="248" y="170" width="128" height="21" rx="3" class="b-bg b2"/>
  <text x="312" y="185" text-anchor="middle" class="b-text b2">AWS ML Certified</text>

  <rect x="388" y="170" width="122" height="21" rx="3" class="b-bg b3"/>
  <text x="449" y="185" text-anchor="middle" class="b-text b3">NVIDIA Inception</text>

  <rect x="522" y="170" width="148" height="21" rx="3" class="b-bg b4"/>
  <text x="596" y="185" text-anchor="middle" class="b-text b4">Google for Startups</text>

  <!-- Sub -->
  <text x="450" y="238" text-anchor="middle" class="sub">Veredictos · PaymentsLine · MIOSA</text>
</svg>
